<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helmi – Brand & Marketing Specialist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F97316;
      --dark:   #1a1a1a;
      --gray:   #6b7280;
      --bg:     #f9f9f7;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(#d1d1c8 1px, transparent 1px);
      background-size: 28px 28px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow: hidden;
    }

    /* ── Hero wrapper ── */
    .hero {
      position: relative;
      max-width: 1100px;
      width: 100%;
      text-align: center;
    }

    /* ── Greeting pill ── */
    .greeting {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1.5px solid #d1d5db;
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 0.9rem;
      color: var(--dark);
      margin-bottom: 20px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
    }

    /* ── Heading ── */
    .heading {
      font-size: clamp(2.6rem, 6vw, 4.4rem);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.1;
      letter-spacing: -1px;
    }
    .heading .name { color: var(--orange); }

    .sub-heading {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--dark);
      margin-top: 4px;
      letter-spacing: -0.5px;
    }

    /* ── Decorative squiggle ── */
    .squiggle {
      position: absolute;
      left: 14%;
      top: 52%;
      width: 70px;
      opacity: 0.85;
      pointer-events: none;
    }

    /* ── Center stage: circle + photo ── */
    .stage {
      position: relative;
      display: inline-block;
      margin-top: 30px;
    }

    .circle-bg {
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: var(--orange);
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .photo {
      position: relative;
      z-index: 2;
      width: 300px;
      height: 370px;
      object-fit: cover;
      object-position: top;
      display: block;
      margin: 0 auto;
      /* Remove background / white fringe if PNG has transparency */
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.12));
    }

    /* ── Skill pills ── */
    .pill {
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--dark);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 999px;
      white-space: nowrap;
      z-index: 10;
      animation: float 4s ease-in-out infinite;
    }
    .pill-marketing { top: 10%;   left: 3%;  animation-delay: 0s;   }
    .pill-ads        { top: 45%;  right: 5%; animation-delay: 0.8s; }
    .pill-brand      { top: 68%;  left: 8%;  animation-delay: 1.6s; }
    .pill-social     { top: 80%;  right: 8%; animation-delay: 2.4s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    /* ── Side text blocks ── */
    .side-left {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      max-width: 220px;
      text-align: left;
    }
    .side-left .quote-mark {
      font-size: 2.2rem;
      color: var(--dark);
      line-height: 1;
      margin-bottom: 6px;
    }
    .side-left p {
      font-size: 0.82rem;
      color: var(--gray);
      line-height: 1.6;
    }

    .side-right {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
    }
    .side-right .years {
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -1px;
      line-height: 1;
    }
    .side-right .years-label {
      font-size: 0.82rem;
      color: var(--gray);
      margin-top: 4px;
      line-height: 1.5;
    }

    /* ── CTA Buttons ── */
    .cta-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 32px;
    }

    .btn-portfolio {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--orange);
      color: #fff;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 700;
      padding: 12px 26px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-portfolio:hover { opacity: 0.88; transform: scale(1.04); }

    .btn-hire {
      display: inline-flex;
      align-items: center;
      background: transparent;
      color: var(--dark);
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 12px 26px;
      border: 1.5px solid #d1d5db;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-hire:hover { border-color: var(--dark); background: rgba(0,0,0,0.04); }

    /* ── Responsive adjustments ── */
    @media (max-width: 768px) {
      .side-left, .side-right { display: none; }
      .pill { font-size: 0.78rem; padding: 8px 14px; }
      .squiggle { display: none; }
    }
  </style>
</head>
<body>

<section class="hero">

  <!-- Greeting pill -->
  <div class="greeting">नमस्ते 👋</div>

  <!-- Main heading -->
  <h1 class="heading">I'm <span class="name">Helmi</span> 👋,</h1>
  <h2 class="sub-heading">A Brand &amp; Marketing Specialist</h2>

  <!-- Decorative squiggle SVG -->
  <svg class="squiggle" viewBox="0 0 80 50" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M5 45 Q20 5 40 25 Q60 45 75 10" stroke="#F97316" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <line x1="60" y1="8" x2="74" y2="10" stroke="#F97316" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="74" y1="10" x2="72" y2="24" stroke="#F97316" stroke-width="3.5" stroke-linecap="round"/>
  </svg>

  <!-- Floating skill pills -->
  <div class="pill pill-marketing">📢 Marketing</div>
  <div class="pill pill-ads">🚀 Ads</div>
  <div class="pill pill-brand">⭐ Brand</div>
  <div class="pill pill-social">📱 Social Media</div>

  <!-- Left testimonial -->
  <div class="side-left">
    <div class="quote-mark">"</div>
    <p>working under Mas Helmi, and I can confidently say he is an exceptional marketer and brand strategist</p>
  </div>

  <!-- Right stat -->
  <div class="side-right">
    <div class="years">2 Years</div>
    <div class="years-label">in Brand &amp; Marketing<br>Experience</div>
  </div>

  <!-- Center photo stage -->
  <div class="stage">
    <div class="circle-bg"></div>
    <!--
      Replace "your-photo.png" with your actual image filename.
      The image should have a transparent background (PNG).
    -->
    <img
      class="photo"
      src="your-photo.png"
      alt="Helmi – Brand & Marketing Specialist"
      onerror="this.style.opacity='0'"
    />
  </div>

  <!-- CTA Buttons -->
  <div class="cta-group">
    <button class="btn-portfolio">Portfolio ↗</button>
    <button class="btn-hire">Hire me</button>
  </div>

</section>

</body>
</html>
